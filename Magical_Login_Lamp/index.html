<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magical Login Lamp</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars"></div>

  <div class="container">

    <div class="lamp">
      <div class="wire"></div>

      <div class="bulb" id="bulb"></div>

      <div class="light"></div>
    </div>

    <h1>Magical Login</h1>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button id="loginBtn">Unlock Magic</button>

    <p id="message"></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
